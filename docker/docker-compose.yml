networks:
  t2_proxy:
    name: t2_proxy
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24

services:
  ########################### SHARED INFRASTRUCTURE
  portainer-agent:
    image: portainer/agent
    container_name: portainer-agent
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  dozzle-agent:
    image: amir20/dozzle:latest
    container_name: dozzle-agent
    restart: unless-stopped
    command: agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 7007:7007
  
  ############################ AI SERVICES
  ollama:
    image: ollama/ollama:${OLLAMA_DOCKER_TAG:-latest}
    container_name: ollama
    tty: true
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:--1}
    volumes:
      - ${DOCKER_MODELS}/ollama:/root/.ollama
    ports:
      - ${OLLAMA_PORT:-11434}:11434
    networks:
      - t2_proxy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, utility]

  # Prometheus Exporter for Ollama
  ollama-exporter:
    image: lucabecker42/ollama-exporter:latest
    container_name: ollama-exporter
    ports:
      - '8000:8000'
    environment:
      - PORT=8000
      - INTERVAL=30
      - OLLAMA_HOST=ollama:11434
      - API_TIMEOUT=30
      - LOG_LEVEL=INFO
    restart: unless-stopped
    networks:
      - t2_proxy

  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPEN_WEBUI_DOCKER_TAG:-main}
    container_name: open-webui
    depends_on:
      - ollama
    restart: unless-stopped
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-change-this-open-webui-secret}
    volumes:
      - ${DOCKER_RUNTIME:-../runtime}/open-webui:/app/backend/data
    ports:
      - ${OPEN_WEBUI_PORT:-3000}:8080
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - t2_proxy

  qdrant:
    image: qdrant/qdrant:${QDRANT_DOCKER_TAG:-latest}
    container_name: qdrant
    restart: unless-stopped
    volumes:
      - ${DOCKER_MODELS}/qdrant:/qdrant/storage
    ports:
      - ${QDRANT_HTTP_PORT:-6333}:6333
      - ${QDRANT_GRPC_PORT:-6334}:6334
    networks:
      - t2_proxy

  valkey:
    image: valkey/valkey:${VALKEY_DOCKER_TAG:-8-alpine}
    container_name: searxng-valkey
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - ${DOCKER_RUNTIME:-../runtime}/searxng/valkey:/data
    networks:
      - t2_proxy

  searxng:
    image: ghcr.io/searxng/searxng:${SEARXNG_DOCKER_TAG:-latest}
    container_name: searxng
    depends_on:
      - valkey
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL:-http://localhost:8081/}
      - SEARXNG_PORT=8080
      - SEARXNG_BIND_ADDRESS=0.0.0.0
      - SEARXNG_SECRET=${SEARXNG_SECRET:-change-this-searxng-secret}
      - SEARXNG_VALKEY_URL=${SEARXNG_VALKEY_URL:-valkey://valkey:6379/0}
      - SEARXNG_LIMITER=${SEARXNG_LIMITER:-false}
      - SEARXNG_IMAGE_PROXY=${SEARXNG_IMAGE_PROXY:-true}
      - SEARXNG_PUBLIC_INSTANCE=${SEARXNG_PUBLIC_INSTANCE:-false}
      - SEARXNG_METHOD=${SEARXNG_METHOD:-POST}
      - FORCE_OWNERSHIP=true
    volumes:
      - ${DOCKER_DIR:-.}/searxng:/etc/searxng
      - ${DOCKER_RUNTIME:-../runtime}/searxng/data:/var/cache/searxng
    ports:
      - ${SEARXNG_HOST_PORT:-8081}:8080
    networks:
      - t2_proxy